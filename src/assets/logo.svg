<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 230 56" width="230" height="56">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E3A5F"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
  </defs>
  <!-- Abstract folded paper icon -->
  <g transform="translate(6, 6)">
    <rect x="2" y="2" width="24" height="19" rx="2" fill="url(#g)" opacity="0.12"/>
    <rect x="4" y="4" width="20" height="15" rx="1.5" fill="url(#g)" opacity="0.85"/>
    <rect x="4" y="4" width="4" height="15" rx="1.5" fill="#fff" opacity="0.2"/>
    <polygon points="4,4 2,2 6,4" fill="#fff" opacity="0.25"/>
    <rect x="10" y="7" width="10" height="1.5" rx="0.75" fill="#fff" opacity="0.7"/>
    <rect x="10" y="10.5" width="7" height="1.5" rx="0.75" fill="#fff" opacity="0.45"/>
    <rect x="10" y="14" width="9" height="1.5" rx="0.75" fill="#fff" opacity="0.35"/>
  </g>
  <!-- PaperTools text -->
  <text x="40" y="26" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="24" font-weight="700" fill="#1E3A5F" letter-spacing="-0.4">Paper</text>
  <text x="108" y="26" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="24" font-weight="700" fill="#3B82F6" letter-spacing="-0.4">Tools</text>
  <!-- Chinese subtitle -->
  <text x="40" y="46" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#6B7280" letter-spacing="2.5">论文工具箱</text>
</svg>
